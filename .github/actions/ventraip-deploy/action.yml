name: VentraIP deploy
description: Deploy a staged web artefact to a VentraIP cPanel host over SSH and smoke-test the result.

inputs:
  ssh_key:
    description: Private SSH key (PEM contents) for the deploy user.
    required: true
  ssh_passphrase:
    description: Passphrase for the SSH key. Leave empty if the key has no passphrase.
    required: false
    default: ''
  ssh_user:
    description: SSH user on the VentraIP host.
    required: true
  ssh_host:
    description: SSH host. Defaults to the syd7 VentraIP host if empty.
    required: false
    default: s04le.syd7.hostingplatform.net.au
  ssh_port:
    description: SSH port on the VentraIP host.
    required: false
    default: '2683'
  app_dir:
    description: Application release root on the host (releases/<id> live under here, plus the current symlink).
    required: true
  docroot:
    description: Public docroot on the host that should mirror the current release.
    required: true
  site_url:
    description: Public URL used to smoke-test the deployed site.
    required: true
  release_id:
    description: Unique release identifier used as the release subdirectory name.
    required: true
  source_dir:
    description: Local directory containing the staged web release.
    required: false
    default: web-release

runs:
  using: composite
  steps:
    - name: Deploy to VentraIP
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh_key }}
        SSH_PASSPHRASE: ${{ inputs.ssh_passphrase }}
        SSH_USER: ${{ inputs.ssh_user }}
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_PORT: ${{ inputs.ssh_port }}
        APP_DIR: ${{ inputs.app_dir }}
        DOCROOT: ${{ inputs.docroot }}
        SITE_URL: ${{ inputs.site_url }}
        RELEASE_ID: ${{ inputs.release_id }}
        SOURCE_DIR: ${{ inputs.source_dir }}
      run: |
        set -euo pipefail
        : "${SSH_KEY:?ssh_key is required}"
        : "${SSH_USER:?ssh_user is required}"
        : "${SSH_HOST:?ssh_host is required}"
        : "${APP_DIR:?app_dir is required}"
        : "${DOCROOT:?docroot is required}"
        : "${SITE_URL:?site_url is required}"
        : "${RELEASE_ID:?release_id is required}"
        if [[ ! -d "$SOURCE_DIR" ]]; then
          echo "Source directory $SOURCE_DIR not found" >&2
          exit 1
        fi
        for required_path in index.html explorer/index.html schemas/explorer-bundle; do
          if [[ ! -e "$SOURCE_DIR/$required_path" ]]; then
            echo "Source directory $SOURCE_DIR is missing required web artefact: $required_path" >&2
            find "$SOURCE_DIR" -maxdepth 3 -print >&2
            exit 1
          fi
        done
        if [[ -z "$(find "$SOURCE_DIR" -type f -print -quit)" ]]; then
          echo "Source directory $SOURCE_DIR contains no files; refusing to deploy an empty release." >&2
          exit 1
        fi
        mkdir -p ~/.ssh
        SSH_KEY_PATH="$HOME/.ssh/ventraip_deploy_key"
        printf '%s\n' "$SSH_KEY" > "$SSH_KEY_PATH"
        chmod 600 "$SSH_KEY_PATH"
        eval "$(ssh-agent -s)" >/dev/null
        trap 'ssh-agent -k >/dev/null 2>&1 || true' EXIT
        if [[ -n "${SSH_PASSPHRASE:-}" ]]; then
          ASKPASS_SCRIPT="$(mktemp)"
          printf '#!/bin/sh\nprintf %%s "$VENTRAIP_SSH_PASSPHRASE"\n' > "$ASKPASS_SCRIPT"
          chmod 700 "$ASKPASS_SCRIPT"
          VENTRAIP_SSH_PASSPHRASE="$SSH_PASSPHRASE" \
            SSH_ASKPASS="$ASKPASS_SCRIPT" \
            SSH_ASKPASS_REQUIRE=force \
            DISPLAY=none \
            ssh-add "$SSH_KEY_PATH" </dev/null
          rm -f "$ASKPASS_SCRIPT"
        else
          ssh-add "$SSH_KEY_PATH" </dev/null
        fi
        ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        SSH_OPTS="-i $SSH_KEY_PATH -o BatchMode=yes -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -p $SSH_PORT"
        REMOTE_HOME="$(ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" 'printf %s "$HOME"')"
        case "$APP_DIR" in
          '~') APP_DIR="$REMOTE_HOME" ;;
          '~/'*) APP_DIR="$REMOTE_HOME/${APP_DIR#~/}" ;;
        esac
        case "$DOCROOT" in
          '~') DOCROOT="$REMOTE_HOME" ;;
          '~/'*) DOCROOT="$REMOTE_HOME/${DOCROOT#~/}" ;;
        esac
        ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p \"$APP_DIR/releases/$RELEASE_ID\" \"$DOCROOT\""
        rsync -az --delete -e "ssh $SSH_OPTS" "$SOURCE_DIR/" "$SSH_USER@$SSH_HOST:$APP_DIR/releases/$RELEASE_ID/"
        ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "test -f \"$APP_DIR/releases/$RELEASE_ID/index.html\" && test -f \"$APP_DIR/releases/$RELEASE_ID/explorer/index.html\" && test -d \"$APP_DIR/releases/$RELEASE_ID/schemas/explorer-bundle\""
        ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "set -e; cd \"$APP_DIR\"; ln -sfn \"releases/$RELEASE_ID\" current; rsync -a --delete current/ \"$DOCROOT\"/; find \"$DOCROOT\" -type d -exec chmod 755 {} \; ; find \"$DOCROOT\" -type f -exec chmod 644 {} \;"
        ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "test -f \"$DOCROOT/index.html\" && test -f \"$DOCROOT/explorer/index.html\" && test -d \"$DOCROOT/schemas/explorer-bundle\""
        smoke_url() {
          local url="$1"
          local status
          status="$(curl --silent --show-error --location --max-time 30 --output /dev/null --write-out '%{http_code}' "$url" || true)"
          if [[ "$status" != "200" ]]; then
            echo "Smoke test failed for $url: HTTP $status" >&2
            echo "Remote DOCROOT is $DOCROOT. The deploy artefact exists there, so HTTP 404 usually means the cPanel subdomain document root points somewhere else." >&2
            ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "printf 'DOCROOT listing for %s:\n' \"$DOCROOT\"; find \"$DOCROOT\" -maxdepth 2 -mindepth 1 -print | sed -n '1,80p'" >&2 || true
            exit 1
          fi
        }
        smoke_url "$SITE_URL"
        smoke_url "$SITE_URL/explorer/"
        echo "Deployed release $RELEASE_ID to $SITE_URL"
