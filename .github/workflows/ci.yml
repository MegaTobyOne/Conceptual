name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  gates:
    name: Build and gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'

      - name: Install dependencies
        run: npx pnpm@10.10.0 install --frozen-lockfile

      - name: Build
        run: npx pnpm@10.10.0 run build

      - name: Package shape
        run: npx pnpm@10.10.0 run package:check

      - name: Deployment safety
        run: npx pnpm@10.10.0 run check:deployment-safety

      - name: Lint
        run: npx pnpm@10.10.0 run lint
