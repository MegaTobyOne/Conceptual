name: Explorer production tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Explorer release version, for example 1.6.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: explorer-production-tag-${{ inputs.version }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  create-tag:
    name: Validate and create Explorer production tag
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Explorer production tags must be created from main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'

      - name: Install dependencies
        run: npx pnpm@10.10.0 install --frozen-lockfile

      - name: Verify version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Input version $VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Release readiness
        run: npx pnpm@10.10.0 run release:readiness

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="explorer/$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Explorer $VERSION production web release"
          git push origin "$TAG"