          generate_release_notes: true

      - name: Verify receipt tag
        if: needs.build.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          git ls-remote --exit-code origin "refs/tags/shop/${{ needs.build.outputs.shop_version }}"
          {
            echo "## Shop receipt tag verified"
            echo ""
            echo "Found shop/${{ needs.build.outputs.shop_version }} on origin after Marketplace publication."
          } >> "$GITHUB_STEP_SUMMARY"

  publish-pub:
    name: Publish Pub to Marketplace
    needs: build
    if: needs.build.outputs.publish_pub == 'true'
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX artefact
        uses: actions/download-artifact@v4
        with:
          name: pspf-marketplace-vsix
          path: .tmp/vsix

      - name: Dry-run summary
        if: needs.build.outputs.dry_run == 'true'
        run: |
          echo "Dry run: skipping vsce publish, GitHub release, and tag for Pub."
          ls -l .tmp/vsix
          {
            echo "## Pub Marketplace publication skipped"
            echo ""
            echo "This was a dry run. No Pub extension was published, no GitHub release was created, and no pub/${{ needs.build.outputs.pub_version }} receipt tag was created."
            echo ""
            echo "To publish Pub, rerun this workflow from main with target=pub or target=all and dry_run=false, then approve the marketplace environment gate."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to VS Code Marketplace
        if: needs.build.outputs.dry_run != 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_TOKEN }}
        run: |
          set -euo pipefail
          npx --yes @vscode/vsce@3.7.1 publish \
            --packagePath ".tmp/vsix/pspf-pub-${{ needs.build.outputs.pub_version }}.vsix" \
            --pat "$VSCE_PAT"

      - name: Verify Marketplace version
        if: needs.build.outputs.dry_run != 'true'
        env:
          EXTENSION_ID: tobyharvey.pspf-pub
          EXPECTED_VERSION: ${{ needs.build.outputs.pub_version }}
        run: |
          set -euo pipefail
          node scripts/verify-marketplace-version.mjs
          {
            echo "## Pub Marketplace version verified"
            echo ""
            echo "Marketplace Gallery reports $EXTENSION_ID@$EXPECTED_VERSION."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tag and GitHub release
        if: needs.build.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pub/${{ needs.build.outputs.pub_version }}
          name: Pub ${{ needs.build.outputs.pub_version }}
          target_commitish: ${{ github.sha }}
          files: .tmp/vsix/pspf-pub-${{ needs.build.outputs.pub_version }}.vsix
          generate_release_notes: true

      - name: Verify receipt tag
        if: needs.build.outputs.dry_run != 'true'
        run: |
