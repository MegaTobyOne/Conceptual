          git ls-remote --exit-code origin "refs/tags/pub/${{ needs.build.outputs.pub_version }}"
          {
            echo "## Pub receipt tag verified"
            echo ""
            echo "Found pub/${{ needs.build.outputs.pub_version }} on origin after Marketplace publication."
          } >> "$GITHUB_STEP_SUMMARY"
