name: Web release

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: test
        type: choice
        options:
          - test
          - production

permissions:
  contents: read

concurrency:
  group: web-release-${{ inputs.target || (github.ref == 'refs/heads/develop' && 'test') || github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PNPM_VERSION: 10.10.0
  NODE_VERSION: 22.15.0

jobs:
  build:
    name: Build web artefact
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      target: ${{ steps.target.outputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy target
        id: target
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.target }}" ]]; then
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            echo "target=test" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported trigger: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.target.outputs.target == 'production'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser
        if: steps.target.outputs.target == 'production' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.target.outputs.target == 'production' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Build staged web release
        run: pnpm run build:web-release

      - name: Deployment safety
        run: pnpm run check:deployment-safety

      - name: Personal-data gate
        run: pnpm run check:personal-data

      - name: Release readiness
        if: steps.target.outputs.target == 'production'
        run: pnpm run release:readiness

      - name: Set release id
        id: release
        run: echo "release_id=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Upload web artefact
        uses: actions/upload-artifact@v4
        with:
          name: pspf-web-release-${{ steps.release.outputs.release_id }}
          path: .tmp/web-release
          if-no-files-found: error
          retention-days: 14

  deploy-test:
    name: Deploy test web
    needs: build
    if: needs.build.outputs.target == 'test'
    runs-on: [self-hosted, macOS, mechastopheles]
    environment:
      name: test-web
      url: ${{ vars.SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web artefact
        uses: actions/download-artifact@v4
        with:
          name: pspf-web-release-${{ needs.build.outputs.release_id }}
          path: web-release

      - name: Deploy to VentraIP test
        uses: ./.github/actions/ventraip-deploy
        with:
          ssh_key: ${{ secrets.VENTRAIP_DEPLOY_KEY_TEST }}
          ssh_passphrase: ${{ secrets.VENTRAIP_DEPLOY_KEY_PASSPHRASE_TEST }}
          ssh_user: ${{ vars.VENTRAIP_SSH_USER }}
          ssh_host: ${{ vars.VENTRAIP_SSH_HOST }}
          app_dir: ${{ vars.VENTRAIP_APP_DIR }}
          docroot: ${{ vars.VENTRAIP_DOCROOT }}
          site_url: ${{ vars.SITE_URL }}
          release_id: ${{ needs.build.outputs.release_id }}

  deploy-production:
    name: Deploy production web
    needs: build
    if: needs.build.outputs.target == 'production'
    runs-on: [self-hosted, macOS, mechastopheles]
    environment:
      name: production-web
      url: ${{ vars.SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web artefact
        uses: actions/download-artifact@v4
        with:
          name: pspf-web-release-${{ needs.build.outputs.release_id }}
          path: web-release

      - name: Deploy to VentraIP production
        uses: ./.github/actions/ventraip-deploy
        with:
          ssh_key: ${{ secrets.VENTRAIP_DEPLOY_KEY_PROD }}
          ssh_passphrase: ${{ secrets.VENTRAIP_DEPLOY_KEY_PASSPHRASE_PROD }}
          ssh_user: ${{ vars.VENTRAIP_SSH_USER }}
          ssh_host: ${{ vars.VENTRAIP_SSH_HOST }}
          app_dir: ${{ vars.VENTRAIP_APP_DIR }}
          docroot: ${{ vars.VENTRAIP_DOCROOT }}
          site_url: ${{ vars.SITE_URL }}
          release_id: ${{ needs.build.outputs.release_id }}
          protected_paths: |
            test/
